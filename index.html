<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>To-Do List App</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <!-- Header -->

    <div class="header">
        <h2>To-Do List Web App</h2>
    </div>

    <!-- Content -->

    <div class="content">

        <!-- Left Form -->

        <div class="form-box">

            <input type="text"
            id="title"
            placeholder="Title">

            <textarea
            id="description"
            placeholder="Description"></textarea>

            <button onclick="addTask()">
                Save
            </button>

        </div>

        <!-- Right Task List -->

        <div class="task-box">

            <div class="task-header">

                <span>Title</span>
                <span>Description</span>
                <span>Delete</span>

            </div>

            <div id="taskList"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
